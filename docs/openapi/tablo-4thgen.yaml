components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token from login response.

        Format: "Bearer {access_token}"

        '
    LighthouseAuth:
      type: apiKey
      in: header
      name: Lighthouse
      description: 'Lighthouse token from /account/select/ response.

        Used for guide data and device authentication context.

        '
    DeviceAuth:
      type: http
      scheme: custom
      description: "Device authentication using HMAC-MD5 signature.\n\nAuthorization header format: \"tablo:{deviceKey}:{hmac}\"\
        \n\nHMAC calculation:\n1. Build signature string: \"{METHOD}\\n{PATH}\\n{MD5_OF_BODY_OR_EMPTY}\\n{DATE_RFC1123}\"\n\
        2. Calculate HMAC-MD5 using HashKey\n3. Format: \"tablo:{DeviceKey}:{hmac_hex}\"\n\nRequired headers:\n- Authorization:\
        \ tablo:{deviceKey}:{hmac}\n- Date: RFC 1123 formatted date\n- User-Agent: Tablo-FAST/1.7.0 (Mobile; iPhone; iOS 18.4)\n\
        \n\n        Used by cloud-paired clients (including tablo2hdhomerun) after /account/select/.\n        Also send the\
        \ Lighthouse header from the select response.\n\n        Contrast with TabloAuth (iOS request-hash model) used on\
        \ PCAP-derived endpoints."
    TabloAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Format: `tablo:{deviceToken}:{requestHash}`'
  schemas:
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: Bearer
        is_verified:
          type: boolean
          description: Whether the account email is verified
        code:
          type: integer
          description: Error code (only present on failure)
        message:
          type: string
          description: Error message (only present on failure)
    AccountInfo:
      type: object
      properties:
        identifier:
          type: string
          description: Account unique identifier
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AccountProfile'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/AccountDevice'
        code:
          type: integer
        message:
          type: string
    AccountProfile:
      type: object
      properties:
        identifier:
          type: string
          description: Profile unique identifier
        name:
          type: string
          description: Profile display name
        date_joined:
          type: string
          format: date-time
        preferences:
          type: object
          additionalProperties: true
    AccountDevice:
      type: object
      properties:
        serverId:
          type: string
          description: Device server ID (used for selection)
        name:
          type: string
          description: Device friendly name
        type:
          type: string
          example: tablo_gen4
        product:
          type: string
        version:
          type: string
        buildNumber:
          type: integer
        registrationStatus:
          type: string
        lastSeen:
          type: string
          format: date-time
        reachability:
          type: string
          enum:
          - local
          - remote
          - unavailable
        url:
          type: string
          format: uri
          description: Local network URL of the device
    SelectRequest:
      type: object
      required:
      - pid
      - sid
      properties:
        pid:
          type: string
          description: Profile identifier
        sid:
          type: string
          description: Device server ID
    SelectResponse:
      type: object
      properties:
        token:
          type: string
          description: Lighthouse token for device requests
        code:
          type: integer
        message:
          type: string
    ChannelLineup:
      type: object
      required:
      - identifier
      - name
      - kind
      properties:
        identifier:
          type: string
          description: Channel unique identifier
          example: S122912_503_01
        name:
          type: string
          description: Channel name
        kind:
          type: string
          enum:
          - ota
          - ott
          description: Channel type (over-the-air or over-the-top)
        logos:
          type: array
          items:
            $ref: '#/components/schemas/ChannelLogo'
        ota:
          $ref: '#/components/schemas/OtaChannelInfo'
        ott:
          $ref: '#/components/schemas/OttChannelInfo'
    ChannelLogo:
      type: object
      properties:
        kind:
          type: string
          enum:
          - lightLarge
          - darkLarge
          - lightSmall
          - darkSmall
        url:
          type: string
          format: uri
    OtaChannelInfo:
      type: object
      properties:
        major:
          type: integer
          description: Major channel number
        minor:
          type: integer
          description: Minor channel number
        callSign:
          type: string
        network:
          type: string
        streamUrl:
          type: string
        provider:
          type: string
        canRecord:
          type: boolean
    OttChannelInfo:
      type: object
      properties:
        major:
          type: integer
        minor:
          type: integer
        callSign:
          type: string
        network:
          type: string
