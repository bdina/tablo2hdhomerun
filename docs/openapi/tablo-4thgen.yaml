openapi: 3.1.0
info:
  title: Tablo 4th Gen API
  version: 1.1.0
  description: 'Complete API specification for Tablo 4th Generation devices.

    Includes the Lighthouse cloud service for authentication, discovery, and guide data,

    plus the local device REST API (port 8887) and HLS streaming (port 80).


    See docs/tablo-api-guide.md for usage, authentication details, and playback flows.


    ## Cloud Authentication Flow

    1. Login to Lighthouse cloud to get access token

    2. Get account info to retrieve profiles and devices

    3. Select profile/device to obtain Lighthouse token

    4. Use Lighthouse token + HMAC signing for device requests


    Local device endpoints were reverse-engineered from packet captures of the official

    Tablo iOS client. Cloud endpoints document the Lighthouse TV service.'
  x-source-pcaps:
  - tablo_capture-http_filtered.pcap
  - tablo_capture-http_filtered_live+recordings.pcap
  x-captured-device:
    model: Tablo 4G QUAD 128GB
    firmware: 2.2.58
    server_id: SID_5087B856F43D
servers:
- url: https://lighthousetv.ewscloud.com/api/v2
  description: Lighthouse Cloud Service
- url: http://{tabloHost}:8887
  description: Local Tablo REST API
  variables:
    tabloHost:
      default: 192.168.2.28
      description: Tablo LAN IP address
- url: http://{tabloHost}:80
  description: Local Tablo HLS streaming
  variables:
    tabloHost:
      default: 192.168.2.28
      description: Tablo LAN IP address
tags:
- name: Cloud Authentication
  description: Lighthouse cloud authentication endpoints
- name: Cloud Account
  description: Account and device management
- name: Cloud Guide
  description: Guide data from cloud service
- name: server
  description: Device server info, storage, and firmware
- name: settings
  description: User preferences and recording quality settings
- name: guide
  description: Local program guide and live playback
- name: views
  description: Aggregated guide and recording views
- name: recordings
  description: Recorded content management
- name: player
  description: Playback session lifecycle
- name: images
  description: Program and channel artwork
- name: notifications
  description: Real-time event stream
- name: stream
  description: HLS video delivery on port 80
paths:
  /login/:
    post:
      tags:
      - Cloud Authentication
      summary: Login to Lighthouse TV
      operationId: login
      description: 'Authenticate with Tablo account credentials.

        Returns access token for subsequent API calls.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /account/:
    get:
      tags:
      - Cloud Account
      summary: Get account information
      operationId: getAccount
      description: 'Retrieve account details including profiles and registered devices.

        Requires Bearer authentication from login.

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Account information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /account/select/:
    post:
      tags:
      - Cloud Account
      summary: Select profile and device
      operationId: selectDevice
      description: 'Select a profile and device combination to obtain a Lighthouse token.

        This token is required for device API requests and guide data retrieval.

        '
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRequest'
      responses:
        '200':
          description: Lighthouse token for device session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /account/{lighthouseToken}/guide/channels/:
    get:
      tags:
      - Cloud Guide
      summary: Get channel lineup
      operationId: getGuideChannels
      description: 'Retrieve the complete channel lineup including OTA and OTT channels.

        Requires Lighthouse token in path and headers.

        '
      security:
      - BearerAuth: []
      - LighthouseAuth: []
      parameters:
      - name: lighthouseToken
        in: path
        required: true
        schema:
          type: string
        description: Lighthouse token from /account/select/
      responses:
        '200':
          description: Channel lineup
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelLineup'
        '401':
          description: Unauthorized
  /account/guide/channels/{channelId}/airings/{date}/:
    get:
      tags:
      - Cloud Guide
      summary: Get channel airings for a specific date
      operationId: getChannelAirings
      description: 'Retrieve program guide data for a specific channel and date.

        Used to build XMLTV guide data.

        '
      security:
      - BearerAuth: []
      - LighthouseAuth: []
      parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
        description: Channel identifier (e.g., S122912_503_01)
      - name: date
        in: path
        required: true
        schema:
          type: string
          format: date
        description: Date in YYYY-MM-DD format
      responses:
        '200':
          description: Program airings for the channel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GuideAiring'
        '401':
          description: Unauthorized
